<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Motor Hub - Elite Concierge</title>
    <link href="https://fonts.googleapis.com/css2?family=Metropolis:wght@400;500;700&family=Domine:wght@400;500;700&family=Lexend:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#f2ca50",
                        "primary-container": "#d4af37",
                        background: "#131313",
                        surface: "#131313",
                        "on-surface": "#e5e2e1",
                        "surface-container-low": "#1c1b1b",
                        "outline-variant": "#4d4635"
                    },
                    fontFamily: {
                        headline: ["Metropolis"],
                        body: ["Domine"],
                        label: ["Lexend"],
                        display: "Metropolis"
                    }
                }
            }
        };
    </script>
    <style>
        body { font-family: 'Manrope', sans-serif; }
        .glass-nav { backdrop-filter: blur(20px); }
        .hero-bg {
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease-in-out;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
    <!-- TopNavBar -->
    <nav class="fixed top-0 w-full z-50 bg-neutral-900/80 backdrop-blur-xl flex justify-between items-center px-6 md:px-12 py-6 shadow-2xl shadow-yellow-500/10">
        <div class="text-2xl font-black tracking-tighter text-primary">MOTOR HUB</div>

        <!-- Desktop Nav -->
        <div class="hidden md:flex gap-12 items-center">
            <a class="font-manrope tracking-tight font-bold uppercase text-neutral-400 hover:text-white transition-colors" href="inventory.html" data-i18n="nav_inventory">Inventory</a>
            <a class="font-manrope tracking-tight font-bold uppercase text-neutral-400 hover:text-white transition-colors" href="about.html" data-i18n="nav_financing">Financing</a>
            <a class="font-manrope tracking-tight font-bold uppercase text-neutral-400 hover:text-white transition-colors" href="contact.html" data-i18n="nav_contact">Contact</a>

            <!-- Toggles -->
            <button id="lang-toggle" class="text-xs uppercase tracking-widest text-primary border border-primary/30 px-3 py-1 hover:bg-white/5">AR</button>
            <button id="currency-toggle" class="text-xs uppercase tracking-widest text-primary border border-primary/30 px-3 py-1 hover:bg-white/5" data-currency="USD">USD</button>
        </div>

        <button class="hidden md:block font-manrope tracking-tight font-bold uppercase text-primary border border-primary/30 px-6 py-2 hover:bg-white/5 transition-all scale-95 duration-300" data-i18n="btn_book_concierge">
            Book Concierge
        </button>

        <!-- Mobile Menu Button -->
        <button id="mobile-menu-btn" class="md:hidden text-primary">
            <span class="material-symbols-outlined">menu</span>
        </button>
    </nav>

    <!-- Mobile Drawer (Hidden by default) -->
    <div id="mobile-drawer" class="fixed inset-0 bg-neutral-900/95 backdrop-blur-3xl z-40 translate-x-full transition-transform duration-300 flex flex-col pt-32 px-6 pb-12">
        <a class="text-2xl font-bold uppercase text-white mb-6" href="inventory.html" data-i18n="nav_inventory">Inventory</a>
        <a class="text-2xl font-bold uppercase text-white mb-6" href="about.html" data-i18n="nav_financing">Financing</a>
        <a class="text-2xl font-bold uppercase text-white mb-12" href="contact.html" data-i18n="nav_contact">Contact</a>
        <button id="mobile-lang-toggle" class="text-lg uppercase text-primary mb-4 text-left">Switch to AR</button>
        <button id="mobile-currency-toggle" class="text-lg uppercase text-primary text-left">Switch Currency</button>
    </div>

    <!-- Hero Section -->
    <main class="flex-grow flex flex-col">
        <section id="hero" class="relative h-screen flex items-center justify-center overflow-hidden hero-bg bg-neutral-900">
            <div class="absolute inset-0 bg-gradient-to-t from-background via-background/60 to-transparent"></div>
            <div class="relative z-10 text-center px-4 max-w-4xl mx-auto">
                <span class="text-primary tracking-[0.2em] font-bold text-xs uppercase block mb-4">Elite Collection</span>
                <h1 class="text-5xl md:text-8xl font-extrabold tracking-tighter leading-none mb-8" data-i18n="home_title">CONNECT WITH ELITE</h1>
                <div class="flex flex-col sm:flex-row gap-6 justify-center">
                    <a href="inventory.html" class="bg-primary text-background font-bold uppercase tracking-widest text-sm px-8 py-4 hover:brightness-110 transition-all">Explore Inventory</a>
                    <a href="contact.html" class="border border-primary text-primary font-bold uppercase tracking-widest text-sm px-8 py-4 hover:bg-white/5 transition-all">Personal Consult</a>
                </div>
            </div>
        </section>

        <!-- Spotlight Gallery -->
        <section class="py-24 px-6 md:px-12 max-w-[1600px] mx-auto w-full">
            <header class="mb-16 flex justify-between items-end">
                <div>
                    <h2 class="text-4xl md:text-5xl font-bold tracking-tight uppercase">Spotlight Collection</h2>
                    <p class="text-outline-variant text-sm uppercase tracking-widest mt-2">Curated Masterpieces</p>
                </div>
                <a href="inventory.html" class="hidden md:flex items-center gap-2 text-primary text-sm uppercase tracking-widest hover:text-white transition-colors">
                    View All <span class="material-symbols-outlined text-sm">arrow_forward</span>
                </a>
            </header>

            <div id="spotlight-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
                <!-- Spotlight items will be injected here via JS -->
            </div>
        </section>
    </main>

    <!-- Floating FAB -->
    <button id="fab-btn" class="fixed bottom-8 right-8 w-14 h-14 bg-primary text-background rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-transform z-50">
        <span class="material-symbols-outlined">chat</span>
    </button>

    <!-- FAB Popup -->
    <div id="fab-popup" class="fixed bottom-24 right-8 bg-surface-container-low border border-outline-variant p-4 rounded shadow-2xl hidden z-50 flex-col gap-4">
        <a href="https://wa.me/123456789" target="_blank" class="flex items-center gap-3 text-white hover:text-primary transition-colors">
            <span class="material-symbols-outlined">chat_bubble</span> WhatsApp
        </a>
        <a href="tel:+123456789" class="flex items-center gap-3 text-white hover:text-primary transition-colors">
            <span class="material-symbols-outlined">call</span> Direct Call
        </a>
    </div>

    <script type="module">
        import { getSettings, subscribeToSettings } from './settings.js';
        import { getSpotlightVehicles } from './products.js';

        // State
        let currentLang = localStorage.getItem('lang') || 'en';
        let currentCurrency = localStorage.getItem('currency') || 'USD';
        let exchangeRate = 1; // Default
        let translations = {};

        // Fetch Data on Load
        async function init() {
            try {
                const [settings, spotlight, transRes] = await Promise.all([
                    getSettings().catch(() => ({ hero_bg_url: '', usd_to_egp_rate: 50 })),
                    getSpotlightVehicles().catch(() => []),
                    fetch('translations.json').then(r => r.json())
                ]);

                translations = transRes;
                if (settings.usd_to_egp_rate) exchangeRate = settings.usd_to_egp_rate;

                // Set Hero BG
                if (settings.hero_bg_url) {
                    document.getElementById('hero').style.backgroundImage = `url('${settings.hero_bg_url}')`;
                } else {
                    document.getElementById('hero').style.backgroundImage = "url('https://images.unsplash.com/photo-1544829099-b9a0c07fad1a')"; // Fallback
                }

                renderSpotlight(spotlight);
                applyLanguage();
                updateCurrencyDisplay();
            } catch (err) {
                console.error("Initialization error:", err);
            }
        }

        // Setup Realtime Settings Subscription
        subscribeToSettings((newSettings) => {
            if (newSettings.usd_to_egp_rate) {
                exchangeRate = newSettings.usd_to_egp_rate;
                updateCurrencyDisplay();
            }
            if (newSettings.hero_bg_url) {
                document.getElementById('hero').style.backgroundImage = `url('${newSettings.hero_bg_url}')`;
            }
        });

        // Helpers
        function escapeHTML(str) {
            if (typeof str !== 'string') return str;
            return str.replace(/[&<>'"]/g,
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        // Spotlight Render
        function renderSpotlight(vehicles) {
            const grid = document.getElementById('spotlight-grid');
            if (!vehicles || vehicles.length === 0) {
                grid.innerHTML = '<p class="text-neutral-500">No spotlight vehicles available.</p>';
                return;
            }
            grid.innerHTML = vehicles.map(v => `
                <div class="group cursor-pointer" onclick="window.location.href='details.html?id=${escapeHTML(v.id)}'">
                    <div class="relative overflow-hidden aspect-[16/10] bg-surface-container-low mb-6">
                        <img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" src="${escapeHTML(v.image_url)}" alt="${escapeHTML(v.name)}" />
                        <div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent opacity-60"></div>
                        ${v.is_sold_out ? '<div class="absolute inset-0 bg-black/50 flex items-center justify-center"><span class="bg-red-900 text-white px-4 py-2 text-xs font-bold uppercase">Sold Out</span></div>' : ''}
                    </div>
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-2xl font-bold tracking-tight uppercase text-white">${escapeHTML(v.name)}</h3>
                            <p class="text-outline-variant text-xs uppercase tracking-widest mt-1">${escapeHTML(v.version || '')}</p>
                        </div>
                        <span class="text-xl font-black text-primary price-display" data-usd="${escapeHTML(String(v.price_usd || ''))}">${escapeHTML(formatPrice(v.price_usd))}</span>
                    </div>
                </div>
            `).join('');
        }

        function formatPrice(usdPrice) {
            if (!usdPrice) return 'Upon Request';
            const price = currentCurrency === 'USD' ? usdPrice : usdPrice * exchangeRate;
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: currentCurrency, maximumFractionDigits: 0 }).format(price);
        }

        function updateCurrencyDisplay() {
            document.querySelectorAll('.price-display').forEach(el => {
                const usd = parseFloat(el.getAttribute('data-usd'));
                el.textContent = formatPrice(usd);
            });
            document.getElementById('currency-toggle').textContent = currentCurrency;
        }

        function applyLanguage() {
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang] && translations[currentLang][key]) {
                    el.textContent = translations[currentLang][key];
                }
            });
            document.getElementById('lang-toggle').textContent = currentLang === 'en' ? 'AR' : 'EN';
        }

        // Event Listeners
        document.getElementById('lang-toggle').addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('lang', currentLang);
            applyLanguage();
        });

        document.getElementById('currency-toggle').addEventListener('click', () => {
            currentCurrency = currentCurrency === 'USD' ? 'EGP' : 'USD';
            localStorage.setItem('currency', currentCurrency);
            updateCurrencyDisplay();
        });

        // Mobile Menu
        const menuBtn = document.getElementById('mobile-menu-btn');
        const drawer = document.getElementById('mobile-drawer');
        menuBtn.addEventListener('click', () => {
            drawer.classList.toggle('translate-x-full');
            menuBtn.innerHTML = drawer.classList.contains('translate-x-full')
                ? '<span class="material-symbols-outlined">menu</span>'
                : '<span class="material-symbols-outlined">close</span>';
        });

        // FAB
        const fabBtn = document.getElementById('fab-btn');
        const fabPopup = document.getElementById('fab-popup');
        fabBtn.addEventListener('click', () => {
            fabPopup.classList.toggle('hidden');
            fabPopup.classList.toggle('flex');
        });

        init();
    </script>
</body>
</html>
