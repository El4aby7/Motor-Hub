<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Motor Hub - Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Metropolis:wght@400;500;700&family=Domine:wght@400;500;700&family=Lexend:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms">
        </script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#f2ca50",
                        background: "#131313",
                        surface: "#131313",
                        "on-surface": "#e5e2e1",
                        "surface-container-low": "#1c1b1b",
                        "outline-variant": "#4d4635"
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
    <!-- TopNavBar -->
    <nav class="fixed top-0 w-full z-50 bg-neutral-900/80 backdrop-blur-xl flex justify-between items-center px-6 md:px-12 py-6 shadow-2xl shadow-yellow-500/10">
        <div class="text-2xl font-black tracking-tighter text-primary">MOTOR HUB</div>

        <!-- Desktop Nav -->
        <div class="hidden md:flex gap-12 items-center">
            <a class="font-manrope tracking-tight font-bold uppercase text-neutral-400 hover:text-white transition-colors" href="inventory.html" data-i18n="nav_inventory">Inventory</a>
            <a class="font-manrope tracking-tight font-bold uppercase text-neutral-400 hover:text-white transition-colors" href="about.html" data-i18n="nav_financing">Financing</a>
            <a class="font-manrope tracking-tight font-bold uppercase text-neutral-400 hover:text-white transition-colors" href="contact.html" data-i18n="nav_contact">Contact</a>

            <!-- Toggles -->
            <button id="lang-toggle" class="text-xs uppercase tracking-widest text-primary border border-primary/30 px-3 py-1 hover:bg-white/5">AR</button>
            <button id="currency-toggle" class="text-xs uppercase tracking-widest text-primary border border-primary/30 px-3 py-1 hover:bg-white/5" data-currency="USD">USD</button>
        </div>

        <button class="hidden md:block font-manrope tracking-tight font-bold uppercase text-primary border border-primary/30 px-6 py-2 hover:bg-white/5 transition-all scale-95 duration-300" data-i18n="btn_book_concierge">
            Book Concierge
        </button>

        <!-- Mobile Menu Button -->
        <button id="mobile-menu-btn" class="md:hidden text-primary">
            <span class="material-symbols-outlined">menu</span>
        </button>
    </nav>

    <!-- Mobile Drawer (Hidden by default) -->
    <div id="mobile-drawer" class="fixed inset-0 bg-neutral-900/95 backdrop-blur-3xl z-40 translate-x-full transition-transform duration-300 flex flex-col pt-32 px-6 pb-12">
        <a class="text-2xl font-bold uppercase text-white mb-6" href="inventory.html" data-i18n="nav_inventory">Inventory</a>
        <a class="text-2xl font-bold uppercase text-white mb-6" href="about.html" data-i18n="nav_financing">Financing</a>
        <a class="text-2xl font-bold uppercase text-white mb-12" href="contact.html" data-i18n="nav_contact">Contact</a>
        <button id="mobile-lang-toggle" class="text-lg uppercase text-primary mb-4 text-left">Switch to AR</button>
        <button id="mobile-currency-toggle" class="text-lg uppercase text-primary text-left">Switch Currency</button>
    </div>

    <main class="pt-32 pb-24 px-6 md:px-12 max-w-[1600px] mx-auto w-full">
        <!-- Header & Filters -->
        <header class="mb-16 flex flex-col md:flex-row md:items-start justify-between gap-12">
            <div class="max-w-2xl">
                <span class="text-primary tracking-[0.2em] font-bold text-xs uppercase block mb-4">Elite Collection</span>
                <h1 class="text-5xl md:text-8xl font-extrabold tracking-tighter leading-none mb-8">PREMIER<br/><span class="text-neutral-500">INVENTORY</span></h1>

                <!-- Brand Filter (Chips) -->
                <div class="flex flex-col gap-3">
                    <span class="text-[10px] uppercase tracking-widest text-outline-variant font-bold">Marque</span>
                    <div id="brand-chips" class="flex flex-wrap gap-2">
                        <button class="brand-chip bg-white/10 text-white px-4 py-2 text-xs font-bold uppercase tracking-widest hover:bg-white/20 transition-colors border border-primary" data-brand="">All</button>
                        <!-- Injected via JS -->
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-6 w-full md:w-[400px]">
                <!-- Search & Category -->
                <div class="flex gap-4">
                    <div class="flex flex-col gap-2 flex-grow">
                        <span class="text-[10px] uppercase tracking-widest text-outline-variant font-bold">Search</span>
                        <input id="search-input" type="text" placeholder="Search..." class="bg-surface-container-low border-none text-white text-sm px-4 py-3 focus:ring-1 focus:ring-primary w-full">
                    </div>
                    <div class="flex flex-col gap-2 flex-grow">
                        <span class="text-[10px] uppercase tracking-widest text-outline-variant font-bold">Category</span>
                        <select id="category-select" class="bg-surface-container-low border-none text-white text-sm uppercase tracking-widest px-4 py-3 focus:ring-1 focus:ring-primary w-full">
                            <option value="">All Types</option>
                        </select>
                    </div>
                </div>

                <!-- Color Filter -->
                <div class="flex flex-col gap-2">
                    <span class="text-[10px] uppercase tracking-widest text-outline-variant font-bold">Exterior Color</span>
                    <div id="color-dots" class="flex flex-wrap gap-3">
                        <!-- Injected via JS -->
                    </div>
                </div>

                <!-- Dual Thumb Price Slider (Simulated via two inputs for MVP without extra libs) -->
                <div class="flex flex-col gap-2">
                    <span class="text-[10px] uppercase tracking-widest text-outline-variant font-bold flex justify-between">
                        <span>Price Range (USD)</span>
                        <span id="price-display" class="text-primary">$0 - $1M+</span>
                    </span>
                    <div class="flex items-center gap-2">
                        <input id="price-min" type="range" min="0" max="1000000" step="10000" value="0" class="w-full accent-primary">
                        <input id="price-max" type="range" min="0" max="1000000" step="10000" value="1000000" class="w-full accent-primary">
                    </div>
                </div>
            </div>
        </header>

        <!-- Inventory Grid -->
        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-24">
            <!-- Loading State -->
            <div class="col-span-full text-center text-neutral-500 py-12">Loading inventory...</div>
        </div>
    </main>

    <script type="module">
        import { getVehicles } from './products.js';
        import { getBrands } from './brands.js';
        import { getCategories } from './categories.js';

        let allVehicles = [];
        let allBrands = [];
        let allCategories = [];
        let selectedBrandId = '';
        let selectedColorHex = '';

        const grid = document.getElementById('products-grid');
        const searchInput = document.getElementById('search-input');
        const brandChipsContainer = document.getElementById('brand-chips');
        const categorySelect = document.getElementById('category-select');
        const priceMin = document.getElementById('price-min');
        const priceMax = document.getElementById('price-max');
        const priceDisplay = document.getElementById('price-display');
        const colorDotsContainer = document.getElementById('color-dots');

        async function init() {
            try {
                // Fetch all required data
                const [vehiclesRes, brandsRes, categoriesRes] = await Promise.all([
                    getVehicles().catch(() => []),
                    getBrands().catch(() => []),
                    getCategories().catch(() => [])
                ]);

                allVehicles = vehiclesRes;
                allBrands = brandsRes;
                allCategories = categoriesRes;

                populateFilters();
                filterAndRender();

            } catch (err) {
                grid.innerHTML = '<div class="col-span-full text-red-500 text-center py-12">Failed to load inventory.</div>';
                console.error(err);
            }
        }

        function populateFilters() {
            // Populate Brand Chips
            allBrands.forEach(b => {
                const btn = document.createElement('button');
                btn.className = 'brand-chip bg-surface-container-low text-neutral-400 px-4 py-2 text-xs font-bold uppercase tracking-widest hover:bg-white/10 hover:text-white transition-colors border border-transparent';
                btn.setAttribute('data-brand', b.id);
                btn.textContent = b.name;
                brandChipsContainer.appendChild(btn);
            });

            // Handle Brand Click
            document.querySelectorAll('.brand-chip').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.brand-chip').forEach(b => {
                        b.classList.remove('border-primary', 'bg-white/10', 'text-white');
                        b.classList.add('bg-surface-container-low', 'border-transparent', 'text-neutral-400');
                    });
                    e.target.classList.add('border-primary', 'bg-white/10', 'text-white');
                    e.target.classList.remove('bg-surface-container-low', 'border-transparent', 'text-neutral-400');
                    selectedBrandId = e.target.getAttribute('data-brand');
                    filterAndRender();
                });
            });

            // Populate Categories
            allCategories.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.name_en;
                categorySelect.appendChild(opt);
            });

            // Extract Unique Colors and Populate
            const uniqueColors = new Map();
            allVehicles.forEach(v => {
                if (v.colors) {
                    v.colors.forEach(c => {
                        if (c.hex && !uniqueColors.has(c.hex)) {
                            uniqueColors.set(c.hex, c.name);
                        }
                    });
                }
            });

            const allColorBtn = document.createElement('button');
            allColorBtn.className = 'w-6 h-6 rounded-full border-2 border-primary color-dot flex items-center justify-center';
            allColorBtn.style.background = 'conic-gradient(red, yellow, green, cyan, blue, magenta, red)';
            allColorBtn.setAttribute('data-hex', '');
            allColorBtn.title = "All Colors";
            colorDotsContainer.appendChild(allColorBtn);

            uniqueColors.forEach((name, hex) => {
                const btn = document.createElement('button');
                btn.className = 'w-6 h-6 rounded-full border-2 border-transparent hover:border-white transition-colors color-dot';
                btn.style.backgroundColor = hex;
                btn.setAttribute('data-hex', hex);
                btn.title = name;
                colorDotsContainer.appendChild(btn);
            });

            // Handle Color Click
            document.querySelectorAll('.color-dot').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.color-dot').forEach(b => b.classList.replace('border-primary', 'border-transparent'));
                    e.target.classList.replace('border-transparent', 'border-primary');
                    if (e.target === allColorBtn) {
                        e.target.classList.add('border-primary'); // Keep primary on 'All'
                    }
                    selectedColorHex = e.target.getAttribute('data-hex');
                    filterAndRender();
                });
            });
        }

        function filterAndRender() {
            const searchTerm = searchInput.value.toLowerCase();
            const categoryId = categorySelect.value;
            let minP = parseInt(priceMin.value);
            let maxP = parseInt(priceMax.value);

            // Ensure min <= max
            if (minP > maxP) {
                const tmp = minP; minP = maxP; maxP = tmp;
            }

            // Update display
            const formatMax = maxP >= 1000000 ? '$1M+' : '$' + (maxP/1000).toFixed(0) + 'K';
            const formatMin = '$' + (minP/1000).toFixed(0) + 'K';
            priceDisplay.textContent = `${formatMin} - ${formatMax}`;

            const filtered = allVehicles.filter(v => {
                const matchSearch = v.name.toLowerCase().includes(searchTerm) || (v.version && v.version.toLowerCase().includes(searchTerm));
                const matchBrand = !selectedBrandId || v.brand_id === selectedBrandId;
                const matchCategory = !categoryId || v.category_id === categoryId;

                // Color match logic: if a vehicle has no colors defined, we only show it if "All Colors" is selected
                let matchColor = !selectedColorHex;
                if (selectedColorHex && v.colors) {
                    matchColor = v.colors.some(c => c.hex === selectedColorHex);
                }

                // Price logic: vehicles without price (Upon Request) bypass filter OR we can hide them. Let's show them.
                const matchPrice = !v.price_usd || (v.price_usd >= minP && v.price_usd <= maxP);

                return matchSearch && matchBrand && matchCategory && matchColor && matchPrice;
            });

            renderGrid(filtered);
        }

        function escapeHTML(str) {
            if (typeof str !== 'string') return str;
            return str.replace(/[&<>'"]/g,
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        function renderGrid(vehicles) {
            if (vehicles.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full bg-surface-container-high p-12 text-center border border-outline-variant/30">
                        <span class="material-symbols-outlined text-primary text-5xl mb-4">search_off</span>
                        <h3 class="text-2xl font-bold uppercase mb-2">No Vehicles Found</h3>
                        <p class="text-neutral-500 text-sm">Adjust your filters to see more results.</p>
                    </div>
                `;
                return;
            }

            // Simple fav check
            const favs = JSON.parse(localStorage.getItem('favorites') || '[]');

            grid.innerHTML = vehicles.map(v => {
                const isFav = favs.includes(v.id);
                const favIcon = isFav ? 'favorite' : 'favorite_border';
                const favColor = isFav ? 'text-red-500' : 'text-white hover:text-red-500';

                const eId = escapeHTML(v.id);
                const eName = escapeHTML(v.name);
                const eImg = escapeHTML(v.image_url);
                const eVersion = escapeHTML(v.version || 'Base Model');
                const ePrice = v.price_usd ? '$' + v.price_usd.toLocaleString() : 'Upon Request';
                const eEngine = escapeHTML(v.engine || 'N/A');
                const eMileage = escapeHTML(v.mileage ? v.mileage + ' KM' : 'New');

                return `
                <div class="group relative">
                    <div class="relative overflow-hidden aspect-[16/10] bg-surface-container-low mb-8 cursor-pointer" onclick="window.location.href='details.html?id=${eId}'">
                        <img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 ${v.is_sold_out ? 'grayscale' : ''}" src="${eImg}" alt="${eName}"/>
                        <div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent opacity-60"></div>
                        ${v.is_sold_out ? '<div class="absolute inset-0 bg-black/50 flex items-center justify-center"><span class="bg-red-900 text-white px-6 py-2 font-bold uppercase tracking-widest border border-red-500/50">Sold Out</span></div>' : ''}
                    </div>

                    <!-- Favorite Button Overlay -->
                    <button class="absolute top-4 right-4 z-10 bg-black/50 backdrop-blur p-2 rounded-full ${favColor} transition-colors" onclick="toggleFav('${eId}')">
                        <span class="material-symbols-outlined">${favIcon}</span>
                    </button>

                    <div class="flex flex-col gap-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-3xl font-bold tracking-tight uppercase">${eName}</h3>
                                <p class="text-outline-variant text-sm uppercase tracking-widest mt-1">${eVersion}</p>
                            </div>
                            <span class="text-2xl font-black text-primary">${escapeHTML(ePrice)}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-y-4 border-t border-outline-variant/20 pt-6">
                            <div>
                                <span class="text-[10px] uppercase tracking-widest text-primary font-bold block">Engine</span>
                                <span class="text-sm font-medium">${eEngine}</span>
                            </div>
                            <div>
                                <span class="text-[10px] uppercase tracking-widest text-primary font-bold block">Mileage</span>
                                <span class="text-sm font-medium">${eMileage}</span>
                            </div>
                        </div>
                        <a href="details.html?id=${eId}" class="w-full block text-center border border-outline-variant text-white uppercase tracking-[0.2em] text-[10px] font-bold py-5 hover:bg-primary hover:text-black hover:border-primary transition-all">
                            View Details
                        </a>
                    </div>
                </div>
            `}).join('');
        }

        // Global function for the fav button click inside HTML string
        window.toggleFav = function(id) {
            let favs = JSON.parse(localStorage.getItem('favorites') || '[]');
            if (favs.includes(id)) {
                favs = favs.filter(f => f !== id);
            } else {
                favs.push(id);
            }
            localStorage.setItem('favorites', JSON.stringify(favs));
            filterAndRender(); // Re-render to update heart icon
        };

        // Listeners
        searchInput.addEventListener('input', filterAndRender);
        categorySelect.addEventListener('change', filterAndRender);
        priceMin.addEventListener('input', filterAndRender);
        priceMax.addEventListener('input', filterAndRender);

        init();
    </script>

    <!-- Floating FAB -->
    <button id="fab-btn" class="fixed bottom-8 right-8 w-14 h-14 bg-primary text-background rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-transform z-50">
        <span class="material-symbols-outlined">chat</span>
    </button>

    <!-- FAB Popup -->
    <div id="fab-popup" class="fixed bottom-24 right-8 bg-surface-container-low border border-outline-variant p-4 rounded shadow-2xl hidden z-50 flex-col gap-4">
        <a href="https://wa.me/123456789" target="_blank" class="flex items-center gap-3 text-white hover:text-primary transition-colors">
            <span class="material-symbols-outlined">chat_bubble</span> WhatsApp
        </a>
        <a href="tel:+123456789" class="flex items-center gap-3 text-white hover:text-primary transition-colors">
            <span class="material-symbols-outlined">call</span> Direct Call
        </a>
    </div>

<script>

        // Mobile Menu
        const menuBtn = document.getElementById('mobile-menu-btn');
        const drawer = document.getElementById('mobile-drawer');
        if (menuBtn && drawer) {
            menuBtn.addEventListener('click', () => {
                drawer.classList.toggle('translate-x-full');
                menuBtn.innerHTML = drawer.classList.contains('translate-x-full')
                    ? '<span class="material-symbols-outlined">menu</span>'
                    : '<span class="material-symbols-outlined">close</span>';
            });
        }

        // FAB
        const fabBtn = document.getElementById('fab-btn');
        const fabPopup = document.getElementById('fab-popup');
        if (fabBtn && fabPopup) {
            fabBtn.addEventListener('click', () => {
                fabPopup.classList.toggle('hidden');
                fabPopup.classList.toggle('flex');
            });
        }

        // ==== Global Logic ====
        let currentLang = localStorage.getItem('lang') || 'en';
        let currentCurrency = localStorage.getItem('currency') || 'USD';
        let exchangeRate = 1;
        let translations = {};

        async function initGlobal() {
            try {
                // Fetch translations directly
                const transRes = await fetch('translations.json').then(r => r.json());
                translations = transRes;
                applyLanguage();
                if (typeof updateCurrencyDisplay === 'function') {
                    updateCurrencyDisplay();
                } else {
                    const cToggle = document.getElementById('currency-toggle');
                    if (cToggle) cToggle.textContent = currentCurrency;
                }
            } catch (err) {
                console.error("Global init error:", err);
            }
        }

        function applyLanguage() {
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang] && translations[currentLang][key]) {
                    el.textContent = translations[currentLang][key];
                }
            });
            const lt = document.getElementById('lang-toggle');
            if(lt) lt.textContent = currentLang === 'en' ? 'AR' : 'EN';
            const mlt = document.getElementById('mobile-lang-toggle');
            if(mlt) mlt.textContent = currentLang === 'en' ? 'Switch to AR' : 'Switch to EN';
        }

        const langToggleBtn = document.getElementById('lang-toggle');
        if(langToggleBtn) {
            langToggleBtn.addEventListener('click', () => {
                currentLang = currentLang === 'en' ? 'ar' : 'en';
                localStorage.setItem('lang', currentLang);
                applyLanguage();
            });
        }

        const mlangToggleBtn = document.getElementById('mobile-lang-toggle');
        if(mlangToggleBtn) {
            mlangToggleBtn.addEventListener('click', () => {
                currentLang = currentLang === 'en' ? 'ar' : 'en';
                localStorage.setItem('lang', currentLang);
                applyLanguage();
            });
        }

        const currToggleBtn = document.getElementById('currency-toggle');
        if(currToggleBtn) {
            currToggleBtn.addEventListener('click', () => {
                currentCurrency = currentCurrency === 'USD' ? 'EGP' : 'USD';
                localStorage.setItem('currency', currentCurrency);
                currToggleBtn.textContent = currentCurrency;
                if (typeof updateCurrencyDisplay === 'function') updateCurrencyDisplay();
            });
        }

        const mcurrToggleBtn = document.getElementById('mobile-currency-toggle');
        if(mcurrToggleBtn) {
            mcurrToggleBtn.addEventListener('click', () => {
                currentCurrency = currentCurrency === 'USD' ? 'EGP' : 'USD';
                localStorage.setItem('currency', currentCurrency);
                if (typeof updateCurrencyDisplay === 'function') updateCurrencyDisplay();
            });
        }

        initGlobal();

</script>
</body>
</html>
